<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zootopia Registration</title>
    <link href="styles.css" rel="stylesheet">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <style>
    .registration-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            width: 100%;
            margin: 30px auto;
        }

        .registration-form label {
            font-weight: bold;
            text-align: left;
        }

        .registration-form input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .registration-form button {
            padding: 12px;
            font-size: 18px;
            background-color: #2a7f62;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .registration-form button:hover {
            background-color: #24674f;
        }

        @media (max-width: 768px) {
            .registration-form {
                max-width: 90%;
            }
        }</style>
</head>
<body>

    <nav>
        <div>
            <img src="images/logo.png">
        </div>
        <div class="list">
            <a href="index.html">Home</a>
            <a href="animalworld.html">Animal worlds</a>
            <a href="restaurant.html">Resturaunt</a>
            <a href="catalog.html">Catalog</a>
            <a href="events.html">Events</a>
            <a href="map.html">Map</a>
            <a href="registration.html">Registration</a>
            <a href="newsletter.html">Newsletter</a>
        </div>
    </nav>

     <section class="section">
        <h1 class="header" style="color: #1B5E3C;">Sign Up for the Zootopia Newsletter</h1></section> 
      </section>

        <p style="text-align: center; color: aliceblue;">Stay up-to-date on special events, new animals, and exclusive offers!</p>

    
        <form action="thankyou.html" method="get" class="registration-form">
            <label for="firstName">First Name:</label>
            <input type="text" id="firstName" name="firstName" required>

            <label for="lastName">Last Name:</label>
            <input type="text" id="lastName" name="lastName" required>

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" required>

            <button type="submit">Subscribe</button>
        </form>
    </main>
 <footer>
        <div class="flex-row foot">
            <div><h2>Zootopia Gardens © 2026</h2></div>
            <div>
            <a href="#contact"> | Contact</a>
            <a href="#hours">| Hours</a>
            <a href="#contact">| Location</a>
            </div>
        </div>

    </footer>
    
</body>
</html>
